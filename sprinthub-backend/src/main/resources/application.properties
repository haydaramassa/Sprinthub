spring.application.name=sprinthub-backend

spring.datasource.url=jdbc:mysql://localhost:3307/sprinthub_db
spring.datasource.username=sprinthub_user
spring.datasource.password=sprinthub_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
jwt.secret=sprinthub-super-secret-key-for-development-only-please-change-later-2026
jwt.expiration-ms=86400000